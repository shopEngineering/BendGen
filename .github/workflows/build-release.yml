name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            artifact: BendGen-Windows
            exe_name: BendGen.exe
          - os: macos-latest
            artifact: BendGen-macOS
            exe_name: BendGen

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install pyinstaller
          pip install flask>=3.0 pydantic>=2.0 ezdxf>=1.0

      - name: Build with PyInstaller
        run: pyinstaller bendgen.spec --noconfirm

      - name: Copy README
        run: cp README.md dist/BendGen/

      - name: Zip (Windows)
        if: runner.os == 'Windows'
        run: Compress-Archive -Path dist/BendGen -DestinationPath dist/BendGen-Windows.zip
        shell: pwsh

      - name: Zip (macOS)
        if: runner.os == 'macOS'
        run: cd dist && zip -r BendGen-macOS.zip BendGen

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/${{ matrix.artifact }}.zip

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/BendGen-Windows/BendGen-Windows.zip
            artifacts/BendGen-macOS/BendGen-macOS.zip
          generate_release_notes: true
